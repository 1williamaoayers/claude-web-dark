name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build web
        working-directory: packages/web
        run: |
          npm install
          npm run build

      - name: Build server
        working-directory: packages/server
        run: |
          npm install
          npm run build

      - name: Package release
        run: |
          mkdir -p dist/claude-web
          cp -r packages/web/dist dist/claude-web/public
          cp -r packages/server/dist dist/claude-web/server
          cd packages/server
          npm prune --omit=dev
          cd ../..
          cp -r packages/server/node_modules dist/claude-web/server/node_modules
          cp start.sh dist/claude-web/
          cd dist
          tar czf claude-web-dark.tar.gz claude-web/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          files: dist/claude-web-dark.tar.gz
          generate_release_notes: true
