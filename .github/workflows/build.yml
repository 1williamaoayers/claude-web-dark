name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build web
        working-directory: packages/web
        run: |
          npm install
          npm run build

      - name: Build server
        working-directory: packages/server
        run: |
          npm install
          npm run build

      - name: Package release
        run: |
          mkdir -p dist/claude-web
          # 前端编译产物 -> public/
          cp -r packages/web/dist dist/claude-web/public
          # 后端编译产物 -> server/
          cp -r packages/server/dist dist/claude-web/server
          # 打包 node_modules（剔除 devDeps 节省体积）
          cd packages/server
          npm prune --omit=dev
          cd ../..
          cp -r packages/server/node_modules dist/claude-web/server/node_modules
          # 根目录入口脚本
          cat > dist/claude-web/start.sh << 'EOF'
#!/usr/bin/env bash
set -e
DIR="$(cd "$(dirname "$0")" && pwd)"
PORT="${PORT:-8004}"
HOST="${HOST:-0.0.0.0}"
echo "Starting Claude Web on http://$HOST:$PORT"
exec node "$DIR/server/cli.js" start --port "$PORT" --hostname "$HOST"
EOF
          chmod +x dist/claude-web/start.sh
          # 打包
          cd dist
          tar czf claude-web-dark.tar.gz claude-web/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          files: dist/claude-web-dark.tar.gz
          generate_release_notes: true
